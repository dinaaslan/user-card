<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="top"></div>
        <div class="content"> 
            <div class=”name”><img src="/icons/account.png" alt="profile pic" class="profile-pic">Jane Doe</div>
            <div class=”location”><img src ="icons/pin.webp" class="icons">Seattle</div> 
            <div class=”describtion”> Developer | Engineer | Problem Solver</div> 
            <div class=”describtion-2>Master of shadows and the Internet</div> 
            <div class=”settings”><img src="icons/setting.png" class="icons">edit profile</div>   
        </div>
    </div>
</body>
</html>
